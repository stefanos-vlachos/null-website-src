<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beyond the null</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #E6EDF3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .branding {
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 0.85rem;
            text-transform: lowercase;
            letter-spacing: 0.35em;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 400;
        }

        .status-message {
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.02em;
            font-weight: 300;
            opacity: 0.8;
            max-width: 320px;
            margin-bottom: 32px;
        }

        /* Email Form Container */
        .email-form {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 320px;
        }

        .email-input {
            flex: 1;
            background-color: transparent;
            border: 1px solid rgba(230, 237, 243, 0.3);
            border-radius: 4px;
            padding: 12px 16px;
            color: #E6EDF3;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .email-input:focus {
            border-color: #E6EDF3;
        }

        .email-input::placeholder {
            color: rgba(230, 237, 243, 0.4);
        }

        .submit-btn {
            background-color: #E6EDF3;
            color: #121212;
            border: none;
            border-radius: 4px;
            padding: 0 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .links-section {
            margin-top: 56px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .links-header {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            opacity: 0.35;
        }

        .links {
            display: flex;
            gap: 32px;
        }

        .links a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(230, 237, 243, 0.5);
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: lowercase;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: #E6EDF3;
        }

        .links a svg {
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 3rem; }
            .email-form { flex-direction: column; gap: 12px; }
            .submit-btn { padding: 12px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="branding">
            <div class="logo-text">//null.*</div>
            <div class="tagline">*beyond the null</div>
        </div>
        
        <div class="status-message">
            Universe is currently under construction. Leave your email to be notified when the map launches.
        </div>

        <form class="email-form" action="https://formspree.io/f/mvzyjljr" method="POST">
            <input 
                type="email" 
                name="email" 
                class="email-input" 
                placeholder="Enter your email address" 
                required
                autocomplete="off"
            >
            <button type="submit" class="submit-btn">Join</button>
        </form>

        <div class="links-section">
            <div class="links-header">Find us on:</div>
            <div class="links">
                <a href="https://open.spotify.com/user/31qtlowtrdkmlr27eai6fsld5rf4?si=0e68b7bd15ad42c8" target="_blank" rel="noopener noreferrer">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                    </svg>
                    spotify
                </a>
            </div>
        </div>
    </div>

</body>
</html>
