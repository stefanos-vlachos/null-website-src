<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beyond the null</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #E6EDF3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .branding {
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 0.85rem;
            text-transform: lowercase;
            letter-spacing: 0.35em;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 400;
        }

        .status-message {
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.02em;
            font-weight: 300;
            opacity: 0.8;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="branding">
            <div class="logo-text">//null.*</div>
            <div class="tagline">*beyond the null</div>
        </div>
        
        <div class="status-message">
            Universe is currently under construction
        </div>
    </div>

</body>
</html>
