<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beyond the null</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #E6EDF3;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .branding {
            margin-bottom: 48px;
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 0.85rem;
            text-transform: lowercase;
            letter-spacing: 0.35em;
            margin-top: 8px;
            opacity: 0.9;
            font-weight: 400;
        }

        .status-message {
            font-size: 0.95rem;
            line-height: 1.6;
            letter-spacing: 0.02em;
            font-weight: 300;
            opacity: 0.8;
            max-width: 320px;
            margin-bottom: 32px;
        }

        /* Email Form Container */
        .email-form {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 320px;
        }

        .email-input {
            flex: 1;
            background-color: transparent;
            border: 1px solid rgba(230, 237, 243, 0.3);
            border-radius: 4px;
            padding: 12px 16px;
            color: #E6EDF3;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .email-input:focus {
            border-color: #E6EDF3;
        }

        .email-input::placeholder {
            color: rgba(230, 237, 243, 0.4);
        }

        .submit-btn {
            background-color: #E6EDF3;
            color: #121212;
            border: none;
            border-radius: 4px;
            padding: 0 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 3rem; }
            .email-form { flex-direction: column; gap: 12px; }
            .submit-btn { padding: 12px 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="branding">
            <div class="logo-text">//null.*</div>
            <div class="tagline">*beyond the null</div>
        </div>
        
        <div class="status-message">
            Universe is currently under construction. Leave your email to be notified when the map launches.
        </div>

        <form class="email-form" action="https://formspree.io/f/mvzyjljr" method="POST">
            <input 
                type="email" 
                name="email" 
                class="email-input" 
                placeholder="Enter your email address" 
                required
                autocomplete="off"
            >
            <button type="submit" class="submit-btn">Join</button>
        </form>
    </div>

</body>
</html>
